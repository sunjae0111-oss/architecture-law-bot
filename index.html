<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건축법규 AI 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --surface2: #222120;
    --border: #2e2c29; --accent: #c8a96e; --accent2: #e8c98a;
    --text: #f0ebe0; --text-muted: #8a8578; --text-dim: #5a5750;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: var(--surface); }
  .logo-mark { width: 40px; height: 40px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif KR', serif; font-weight: 900; font-size: 20px; color: #0f0e0c; }
  .header-text h1 { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .beta-badge { margin-left: auto; background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3); color: var(--accent); font-size: 10px; padding: 3px 8px; letter-spacing: 1px; }

  .search-section { padding: 40px 24px 24px; max-width: 680px; margin: 0 auto; }
  .search-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .search-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.7; }

  .address-box { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
  .address-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; font-weight: 500; }
  .address-display { font-size: 15px; color: var(--text); min-height: 24px; margin-bottom: 12px; }
  .address-display.placeholder { color: var(--text-dim); font-size: 13px; }

  .addr-btn { width: 100%; padding: 13px; background: var(--accent); border: none; color: #0f0e0c; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s; }
  .addr-btn:hover { background: var(--accent2); }
  .addr-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-weight: 400; margin-top: 8px; }
  .addr-btn.secondary:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  .analyze-btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: #0f0e0c; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; display: none; margin-top: 8px; }
  .analyze-btn:hover { background: var(--accent2); }
  .analyze-btn.visible { display: block; }
  .analyze-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  /* Results */
  .results { max-width: 680px; margin: 0 auto; padding: 0 24px 48px; display: none; }
  .results.visible { display: block; }

  .zone-card { background: var(--surface); border: 1px solid var(--accent); padding: 20px 24px; margin-bottom: 20px; }
  .zone-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: 6px; }
  .zone-name { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .zone-summary { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  @media (max-width: 500px) { .rules-grid { grid-template-columns: 1fr; } }

  .rule-card { background: var(--surface); border: 1px solid var(--border); padding: 16px; transition: border-color 0.2s; }
  .rule-card:hover { border-color: var(--accent); }
  .rule-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 6px; }
  .rule-value { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
  .rule-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .rule-law { font-size: 10px; color: var(--text-dim); margin-top: 8px; font-family: monospace; }

  .caution-box { background: rgba(200,169,110,0.06); border: 1px solid rgba(200,169,110,0.2); border-left: 3px solid var(--accent); padding: 12px 16px; font-size: 12px; color: var(--text-muted); line-height: 1.7; }

  .reset-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 16px; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading { text-align: center; padding: 48px 0; display: none; }
  .loading.visible { display: block; }
  .loading-icon { font-size: 32px; animation: spin 2s linear infinite; display: inline-block; margin-bottom: 16px; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  .samples { margin-top: 20px; }
  .samples-label { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.5px; }
  .sample-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .sample-btn { font-size: 12px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
  .sample-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark">法</div>
  <div class="header-text">
    <h1>건축법규 AI 도우미</h1>
    <p>주소 하나로 건축 법규 한눈에 확인</p>
  </div>
  <div class="beta-badge">BETA</div>
</div>

<div class="search-section">
  <h2 class="search-title">어디에 집을 지으시나요?</h2>
  <p class="search-subtitle">주소를 입력하면 해당 지역의 건축 법규를<br>쉽게 정리해드려요</p>

  <div class="address-box">
    <div class="address-label">📍 건축 예정지 주소</div>
    <div class="address-display placeholder" id="addressDisplay">주소 검색 버튼을 눌러주세요</div>
    <button class="addr-btn" onclick="openPostcode()">🔍 주소 검색</button>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">🏛️ 건축 법규 분석하기</button>

  <div class="samples">
    <div class="samples-label">예시 주소로 테스트해보기</div>
    <div class="sample-btns">
      <button class="sample-btn" onclick="setSample('서울특별시 강남구 역삼동 123')">서울 강남구 역삼동</button>
      <button class="sample-btn" onclick="setSample('서울특별시 마포구 합정동 456')">서울 마포구 합정동</button>
      <button class="sample-btn" onclick="setSample('경기도 성남시 분당구 정자동 789')">경기 성남시 분당구</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="loading-icon">⚖️</div>
  <div class="loading-text">법규를 분석하고 있어요...<br>잠시만 기다려주세요</div>
</div>

<div class="results" id="results">
  <div class="zone-card">
    <div class="zone-label">용도지역</div>
    <div class="zone-name" id="zoneName">—</div>
    <div class="zone-summary" id="zoneSummary">—</div>
  </div>

  <div class="rules-grid" id="rulesGrid"></div>

  <div class="caution-box" id="cautionBox"></div>

  <button class="reset-btn" onclick="reset()">↩ 다른 주소 분석하기</button>
</div>

<script>
  let selectedAddress = '';

  function openPostcode() {
    new daum.Postcode({
      oncomplete: function(data) {
        selectedAddress = data.roadAddress || data.jibunAddress;
        document.getElementById('addressDisplay').textContent = selectedAddress;
        document.getElementById('addressDisplay').classList.remove('placeholder');
        document.getElementById('analyzeBtn').classList.add('visible');
      }
    }).open();
  }

  function setSample(addr) {
    selectedAddress = addr;
    document.getElementById('addressDisplay').textContent = addr;
    document.getElementById('addressDisplay').classList.remove('placeholder');
    document.getElementById('analyzeBtn').classList.add('visible');
  }

  async function analyze() {
    if (!selectedAddress) return;
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '분석 중...';
    document.querySelector('.search-section').style.display = 'none';
    document.getElementById('loading').classList.add('visible');
    document.getElementById('results').classList.remove('visible');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: selectedAddress })
      });
      const data = await res.json();
      renderResults(data);
    } catch(e) {
      alert('오류가 발생했어요. 다시 시도해주세요.');
      reset();
    }

    btn.disabled = false;
    btn.textContent = '🏛️ 건축 법규 분석하기';
  }

  function renderResults(data) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('zoneName').textContent = data.zone || '—';
    document.getElementById('zoneSummary').textContent = data.summary || '—';
    document.getElementById('cautionBox').textContent = data.caution || '';

    const grid = document.getElementById('rulesGrid');
    grid.innerHTML = '';
    (data.rules || []).forEach(rule => {
      const card = document.createElement('div');
      card.className = 'rule-card';
      card.innerHTML = `
        <div class="rule-title">${rule.title}</div>
        <div class="rule-value">${rule.value}</div>
        <div class="rule-desc">${rule.desc}</div>
        <div class="rule-law">📋 ${rule.law}</div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('results').classList.add('visible');
  }

  function reset() {
    selectedAddress = '';
    document.getElementById('addressDisplay').textContent = '주소 검색 버튼을 눌러주세요';
    document.getElementById('addressDisplay').classList.add('placeholder');
    document.getElementById('analyzeBtn').classList.remove('visible');
    document.querySelector('.search-section').style.display = 'block';
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('results').classList.remove('visible');
  }
</script>
</body>
</html>
